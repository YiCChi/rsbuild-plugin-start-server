name: Publish Package

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release and Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        working-directory: plugin
      - name: publish
        # `release` events check out a detached HEAD (the tag), which trips
        # pnpm's default git branch check. The tag content is what we want to
        # publish, so the branch check adds no value here.
        run: pnpm publish --no-git-checks
        working-directory: plugin
